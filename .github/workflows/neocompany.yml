# //// Neocompany Modification — CI for the NeoCompany fork branch
# Runs on push to `neocompany` and on any PR targeting `neocompany`.
# Lighter than upstream's pr.yml: focuses on typecheck + build + unit tests
# for the workspaces we actually ship to app.neocompany.ch. E2E and release-smoke
# stay on the upstream master pipeline.
# //// End Neocompany Modification

name: Neocompany CI

on:
  push:
    branches:
      - neocompany
  pull_request:
    branches:
      - neocompany

concurrency:
  group: neocompany-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck (all workspaces)
        run: pnpm -r typecheck

      - name: Build (all workspaces)
        run: pnpm -r build

      - name: Unit tests (vitest)
        run: pnpm run test:run
        env:
          # Limit parallelism in CI to keep runtime reasonable.
          VITEST_MAX_THREADS: 4

      # Sanity: every fork-specific edit must carry the marker. If we forget,
      # the marker count drops and the next upstream merge becomes opaque.
      - name: Verify Neocompany Modification markers present
        run: |
          count=$(grep -r "Neocompany Modification" \
                    --include="*.ts" --include="*.tsx" --include="*.sh" --include="*.md" \
                    --exclude-dir=node_modules \
                    --exclude-dir=.git \
                    . 2>/dev/null | wc -l)
          echo "Neocompany Modification markers found: $count"
          if [ "$count" -lt 50 ]; then
            echo "::error::Marker count is suspiciously low ($count < 50). Either a refactor accidentally removed them or the convention is breaking."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # E2E against prod (optional, opt-in by repo secrets)
  # ---------------------------------------------------------------------------
  # Runs the tests/e2e/neocompany Playwright suite against app.neocompany.ch
  # if the required secrets are set on the repo. Disabled silently otherwise
  # so the workflow stays green on forks / PRs from contributors who don't
  # have the secrets.
  e2e-neocompany:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/neocompany'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Skip if admin creds not configured
        id: gate
        run: |
          if [ -z "${{ secrets.PAPERCLIP_ADMIN_EMAIL }}" ] || [ -z "${{ secrets.PAPERCLIP_ADMIN_PASSWORD }}" ]; then
            echo "E2E secrets not configured; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run NeoCompany E2E suite
        if: steps.gate.outputs.skip != 'true'
        env:
          PAPERCLIP_ADMIN_EMAIL: ${{ secrets.PAPERCLIP_ADMIN_EMAIL }}
          PAPERCLIP_ADMIN_PASSWORD: ${{ secrets.PAPERCLIP_ADMIN_PASSWORD }}
          PAPERCLIP_BASE_URL: https://app.neocompany.ch
        run: pnpm run test:e2e:neocompany

      - name: Upload Playwright report on failure
        if: failure() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/neocompany/playwright-report/
          retention-days: 7
